# Alacritty Configuration
# Copy this file to variables.local.yml and uncomment/modify values as needed

# Font configuration
alacritty_font_size: 14

# Window configuration
alacritty_window_opacity: 1.0

# Theme name (without .toml extension)
# Will be used as: ~/.alacritty-themes/themes/{theme}.toml
# favorites: tokyo_night,catppuccin_mocha
alacritty_theme: tokyo_night

# Ghostty Configuration
# Font configuration
ghostty_font_family: IosevkaTerm Nerd Font Mono
ghostty_font_size: 12
ghostty_font_style: Heavy

# Theme name
# Built-in themes: https://ghostty.org/docs/config/reference#theme
# favorites: TokyoNight Storm, Catppuccin Mocha, gruvbox-dark
ghostty_theme: Catppuccin Mocha

# MCP Configuration
argocd_mcp_dir: "{{ ansible_env.HOME }}/workspace/github/bradfordwagner/forks/gh.forks.mcp.argocd"
argocd_mcp_url: https://argocd-server.akp-gitops.svc.cluster.local
argocd_mcp_issue_token_enabled: false
argocd_mcp_api_token: '' # set this in variables.local.yml

bradfordwagner_mcp_dir: "{{ ansible_env.HOME }}/workspace/github/bradfordwagner/go.bin/bradfordwagner.go.bin.mcp"
argocd_mcp_skip_verify: true

# User Configuration
user_name: bwagner

# Git identity configuration (default identity used everywhere)
git_user_name: bradfordwagner
git_user_email: wagner.bradford@gmail.com

# Path-based git identity overrides.
# Each entry generates a `[includeIf "gitdir:<path>/"]` block in ~/.gitconfig
# pointing at a generated ~/.gitconfig-<name> fragment with its own [user].
# Example:
#   git_identities:
#     - path: "{{ ansible_env.HOME }}/workspace/github/work/"
#       name: work-username
#       email: work@example.com
git_identities: []
